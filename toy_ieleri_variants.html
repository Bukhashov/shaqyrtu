
<style>

  .v1-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .v1-title { font-family: 'Prata', serif; font-size: 13px; letter-spacing: 4px; text-transform: uppercase; color: #612415; opacity: 0.6; }
  .v1-names { display: flex; align-items: center; gap: 14px; }
  .v1-name { font-family: 'Marck Script', cursive; font-size: 36px; color: #612415; }
  .v1-amp { font-family: 'Marck Script', cursive; font-size: 22px; color: #612415; opacity: 0.45; }
  .v1-roles { display: flex; gap: 70px; }
  .v1-role { font-family: 'Segoe UI', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #612415; opacity: 0.45; }

  .v1-ornament { font-family: 'Marck Script', cursive; font-size: 20px; color: #e8c8b8; }

  /* === ВАРИАНТ 2: Две вертикальные карточки с рамкой === */
  .v2-wrap { display: flex; gap: 16px; }
  .v2-card {
    width: 130px; padding: 20px 12px;
    border: 1px solid #e8c8b8;
    border-radius: 16px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .v2-icon { width: 40px; height: 40px; }
  .v2-name { font-family: 'Marck Script', cursive; font-size: 22px; color: #612415; text-align: center; }

  .v2-title { font-family: 'Prata', serif; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; color: #612415; }

  /* === ВАРИАНТ 3: Большой центральный блок с декором === */
  .v3-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; padding: 24px 30px; }
  .v3-border { position: absolute; inset: 0; border: 1px solid #e8c8b8; border-radius: 24px; }
  .v3-corner {
    position: absolute; width: 18px; height: 18px;
    border-color: #612415; border-style: solid; border-width: 0;
  }
  .v3-corner.tl { top: 6px; left: 6px; border-top-width: 1.5px; border-left-width: 1.5px; border-radius: 4px 0 0 0; }
  .v3-corner.tr { top: 6px; right: 6px; border-top-width: 1.5px; border-right-width: 1.5px; border-radius: 0 4px 0 0; }
  .v3-corner.bl { bottom: 6px; left: 6px; border-bottom-width: 1.5px; border-left-width: 1.5px; border-radius: 0 0 0 4px; }
  .v3-corner.br { bottom: 6px; right: 6px; border-bottom-width: 1.5px; border-right-width: 1.5px; border-radius: 0 0 4px 0; }
  .v3-label { font-family: 'Segoe UI', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #612415; opacity: 0.45; }
  .v3-name1 { font-family: 'Marck Script', cursive; font-size: 38px; color: #612415; line-height: 1.1; }
  .v3-name2 { font-family: 'Marck Script', cursive; font-size: 38px; color: #612415; line-height: 1.1; }
  .v3-roles { display: flex; gap: 10px; align-items: center; font-family: 'Segoe UI', sans-serif; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: #612415; opacity: 0.4; }
  .v3-dot { width: 3px; height: 3px; border-radius: 50%; background: #612415; opacity: 0.3; }
  .v3-divline { width: 60px; height: 1px; background: #e8c8b8; }
  .v3-heart {
    position: relative; width: 12px; height: 12px;
    background: #e8c8b8; transform: rotate(-45deg); border-radius: 1px;
  }
  .v3-heart::before, .v3-heart::after {
    content: ''; position: absolute; width: 12px; height: 12px;
    background: #e8c8b8; border-radius: 50%;
  }
  .v3-heart::before { top: -7px; left: 0; }
  .v3-heart::after { top: 0; right: -7px; }
</style>
